<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts Book</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-hover: #252542;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --danger: #dc3545;
            --danger-hover: #ff4757;
            --danger-bg: rgba(220, 53, 69, 0.1);
            --edit: #3b82f6;
            --edit-hover: #60a5fa;
            --edit-bg: rgba(59, 130, 246, 0.1);
            --text-primary: #eaeaea;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 40px;
        }

        .contacts-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .contact-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
        }

        .contact-item:hover {
            background: var(--bg-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(233, 69, 96, 0.2);
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .contact-details {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .contact-details span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .contact-icon {
            width: 18px;
            height: 18px;
            opacity: 0.6;
            flex-shrink: 0;
        }

        /* === ГРУППА КНОПОК ДЕЙСТВИЙ === */
        .actions {
            display: flex;
            gap: 8px;
            margin-left: 16px;
            flex-shrink: 0;
        }

        /* === СТИЛИ КНОПКИ ИЗМЕНИТЬ === */
        .edit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px;
            background: transparent;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 10px;
            color: var(--edit);
            font-size: 0.8rem;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .edit-btn svg {
            width: 14px;
            height: 14px;
            transition: transform 0.25s ease;
        }

        .edit-btn:hover {
            background: var(--edit-bg);
            border-color: var(--edit);
            color: var(--edit-hover);
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.25);
        }

        .edit-btn:hover svg {
            transform: rotate(-15deg);
        }

        .edit-btn:active {
            transform: scale(0.97);
        }

        /* === СТИЛИ КНОПКИ УДАЛИТЬ === */
        .delete-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px;
            background: transparent;
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 10px;
            color: var(--danger);
            font-size: 0.8rem;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .delete-btn svg {
            width: 14px;
            height: 14px;
            transition: transform 0.25s ease;
        }

        .delete-btn:hover {
            background: var(--danger-bg);
            border-color: var(--danger);
            color: var(--danger-hover);
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(220, 53, 69, 0.25);
        }

        .delete-btn:hover svg {
            transform: rotate(12deg);
        }

        .delete-btn:active {
            transform: scale(0.97);
        }

        /* ============================== */

        .add-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
        }

        .add-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.5);
        }

        .add-button:active {
            transform: translateY(0);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }

            .contact-item {
                padding: 16px 18px;
            }

            .actions {
                gap: 6px;
                margin-left: 12px;
            }

            .edit-btn,
            .delete-btn {
                padding: 7px 12px;
                font-size: 0.75rem;
            }

            .edit-btn svg,
            .delete-btn svg {
                width: 12px;
                height: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Контакты</h1>
        <p class="subtitle">Ваша телефонная книга</p>

        <ul class="contacts-list">
            {% for name, contact in contacts.items() %}
            <li class="contact-item">
                <div class="contact-info">
                    <span class="contact-name">{{ name }}</span>
                    <div class="contact-details">
                        <span>
                            <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
                            </svg>
                            {{ contact["phone"] }}
                        </span>
                        <span>
                            <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                            {{ contact["updated_on"] }}
                        </span>
                    </div>
                </div>

                <div class="actions">
                    <a href="/edit/{{ name }}" class="edit-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                        </svg>
                        Изменить
                    </a>
                    <a href="/delete/{{ name }}" class="delete-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                            <line x1="10" y1="11" x2="10" y2="17" />
                            <line x1="14" y1="11" x2="14" y2="17" />
                        </svg>
                        Удалить
                    </a>
                </div>
            </li>
            {% else %}
            <li class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                <p>Пока нет контактов</p>
            </li>
            {% endfor %}
        </ul>

        <a href="/add" class="add-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Добавить контакт
        </a>
    </div>
</body>

</html>
