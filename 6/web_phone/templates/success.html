<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success!</title>
    <meta http-equiv="refresh" content="3;url=/">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-card: #1a1a2e;
            --accent: #00d26a;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 56px 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow);
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: rgba(0, 210, 106, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            color: var(--accent);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .message {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #00ff88);
            border-radius: 2px;
            animation: progress 3s linear forwards;
        }

        @keyframes progress {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }

        .redirect-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .redirect-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .redirect-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card {
                padding: 40px 28px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
            </svg>
        </div>

        <h1>Готово!</h1>
        <p class="message">{{ operation }} прошло успешно</p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <p class="redirect-text">
            Перенаправление через 3 сек...
            <a href="/">или нажмите здесь</a>
        </p>
    </div>
</body>

</html>
